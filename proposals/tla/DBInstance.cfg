\* TLC configuration for DBInstance.tla
\*
\* Run with:
\*   tlc -workers auto -config DBInstance.cfg DBInstance.tla
\*
\* Or load the spec in the TLA+ Toolbox / VS Code TLA+ extension and create
\* a model with these constants.

SPECIFICATION Spec

CONSTANTS
    Images      = { i1, i2, i3 }
    MaxAttempts = 2

INVARIANTS
    TypeOK
    PgDataAlwaysPresentWhileResourceExists
    NoDestructiveStepWithoutSnapshot
    OSReplaceOnlyWhileVMStopped
    CurrentImageConsistency
    RollbackTargetSet
    VMRunningImpliesOSDV

PROPERTIES
    PatchTerminates
    CreateTerminates
    StopTerminates
    StartTerminates
    DeleteTerminates
